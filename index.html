<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & TOKENS ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:       #0f0f13;
      --bg-surface:    #16161d;
      --bg-card:       rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.07);
      --border-card:   rgba(255,255,255,0.08);
      --border-hover:  rgba(255,255,255,0.16);
      --accent:        #6366f1;
      --accent-soft:   rgba(99,102,241,0.18);
      --accent-glow:   rgba(99,102,241,0.35);
      --accent-hover:  #818cf8;
      --danger:        #ef4444;
      --danger-soft:   rgba(239,68,68,0.15);
      --danger-glow:   rgba(239,68,68,0.4);
      --success:       #22c55e;
      --success-soft:  rgba(34,197,94,0.12);
      --success-glow:  rgba(34,197,94,0.28);
      --text-primary:  #f1f5f9;
      --text-secondary:#94a3b8;
      --text-muted:    #475569;
      --font-sans:     'Inter', system-ui, sans-serif;
      --font-mono:     'JetBrains Mono','Fira Code','Courier New',monospace;
      --radius-card:   12px;
      --radius-btn:    8px;
      --transition:    150ms ease;
      --z-header:      10;
      --z-modal:       100;
      --z-chat:        200;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── APP SHELL ── */
    #app {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 16px 80px;
    }

    /* ── HEADER ── */
    #header {
      position: sticky;
      top: 0;
      z-index: var(--z-header);
      background: rgba(15,15,19,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-card);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      margin-bottom: 24px;
    }

    #header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
    }

    #btn-reset-day {
      font-size: 0.8rem;
      font-family: var(--font-sans);
      font-weight: 500;
      color: var(--danger);
      background: var(--danger-soft);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius-btn);
      padding: 6px 12px;
      cursor: pointer;
      transition: background var(--transition), opacity var(--transition);
    }
    #btn-reset-day:hover { background: rgba(239,68,68,0.25); }
    #btn-reset-day.confirming { background: var(--danger); color: #fff; }

    /* ── DAY TABS ── */
    #day-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    #day-tabs::-webkit-scrollbar { display: none; }

    .day-tab {
      flex-shrink: 0;
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      transition: color var(--transition), background var(--transition), border-color var(--transition);
      white-space: nowrap;
    }
    .day-tab:hover { color: var(--text-primary); border-color: var(--border-hover); }
    .day-tab.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }
    .day-tab.today:not(.active) {
      border-color: rgba(99,102,241,0.45);
      color: var(--accent-hover);
    }

    /* ── TASK LIST ── */
    #task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── TASK CARD ── */
    .task-card {
      display: grid;
      grid-template-columns: 28px 1fr auto 36px;
      align-items: center;
      gap: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-card);
      padding: 14px 12px;
      transition: border-color 300ms ease, box-shadow 300ms ease, background 300ms ease;
      animation: task-add-in 200ms ease;
    }

    @supports not (backdrop-filter: blur(1px)) {
      .task-card { background: rgba(22,22,29,0.95); }
    }

    .task-card:hover { background: var(--bg-card-hover); border-color: var(--border-hover); }

    .task-card.running {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 0 16px var(--accent-glow);
      animation: task-add-in 200ms ease, pulse-border 2.5s ease-in-out infinite;
    }

    .task-card.negative .timer-display {
      color: var(--danger) !important;
      text-shadow: 0 0 8px var(--danger-glow);
      animation: pulse-glow 1s ease-in-out infinite;
    }

    .task-card.drag-over {
      border-color: var(--accent);
      background: var(--accent-soft);
      opacity: 0.7;
    }

    .task-card.dragging { opacity: 0.35; }

    /* ── COMPLETED STATE ── */
    .task-card.completed {
      border-color: rgba(34,197,94,0.4);
      background: rgba(34,197,94,0.05);
      box-shadow: 0 0 0 1px rgba(34,197,94,0.12);
    }
    .task-card.completed:hover {
      background: rgba(34,197,94,0.08);
      border-color: rgba(34,197,94,0.55);
    }
    .task-card.completed .task-name { color: var(--text-secondary); }
    .task-card.completed .timer-display { color: var(--success) !important; }
    .task-card.completed .drag-handle { opacity: 0.25; pointer-events: none; }

    /* ── DRAG HANDLE ── */
    .drag-handle {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      cursor: grab;
      font-size: 1rem;
      user-select: none;
      padding: 2px 0;
      transition: color var(--transition);
    }
    .drag-handle:hover { color: var(--text-secondary); }
    .drag-handle:active { cursor: grabbing; }

    /* ── TASK BODY ── */
    .task-body {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .task-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text-primary);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color var(--transition);
    }
    .task-name:hover { color: var(--accent-hover); }

    /* ── TIMER SECTION ── */
    .task-timer-section {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .timer-display {
      font-family: var(--font-mono);
      font-size: 1.45rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      color: var(--text-primary);
      cursor: pointer;
      transition: color var(--transition);
      white-space: nowrap;
    }
    .timer-display:hover { color: var(--accent-hover); }
    .timer-display.readonly { cursor: default; }
    .timer-display.readonly:hover { color: inherit; }

    /* ── TIMER BUTTONS ROW ── */
    .task-timer-buttons {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: flex-end;
    }

    .btn-start-pause {
      background: none;
      border: 1px solid var(--border-card);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 0.7rem;
      padding: 3px 10px;
      cursor: pointer;
      font-family: var(--font-sans);
      font-weight: 500;
      transition: color var(--transition), border-color var(--transition), background var(--transition);
      white-space: nowrap;
    }
    .btn-start-pause:hover {
      color: var(--accent-hover);
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .task-card.running .btn-start-pause {
      color: var(--accent-hover);
      border-color: var(--accent);
    }

    /* ── COMPLETE BUTTON ── */
    .btn-complete {
      background: none;
      border: 1px solid var(--border-card);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.7rem;
      padding: 3px 8px;
      cursor: pointer;
      font-family: var(--font-sans);
      font-weight: 600;
      transition: color var(--transition), border-color var(--transition), background var(--transition);
      white-space: nowrap;
      line-height: 1.4;
    }
    .btn-complete:hover {
      color: var(--success);
      border-color: var(--success);
      background: var(--success-soft);
    }

    .btn-start-pause.reopen {
      color: var(--success);
      border-color: rgba(34,197,94,0.4);
      background: var(--success-soft);
    }
    .btn-start-pause.reopen:hover {
      color: #fff;
      border-color: var(--success);
      background: rgba(34,197,94,0.28);
    }

    /* ── DELETE BUTTON ── */
    .btn-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color var(--transition), background var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      align-self: center;
    }
    .btn-delete:hover { color: var(--danger); background: var(--danger-soft); }
    .btn-delete.confirming { color: var(--danger); background: var(--danger-soft); }

    /* ── INLINE EDIT INPUTS ── */
    .edit-input {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--accent);
      border-radius: 5px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      outline: none;
      padding: 2px 7px;
      width: 100%;
      transition: box-shadow var(--transition);
    }
    .edit-input:focus { box-shadow: 0 0 0 2px var(--accent-glow); }
    .edit-input.shake { animation: shake 200ms ease; }

    .timer-edit-input {
      font-family: var(--font-mono);
      font-size: 1.45rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      width: 120px;
      text-align: right;
    }

    /* ── ADD TASK BUTTON ── */
    #btn-add-task {
      width: 100%;
      margin-top: 10px;
      padding: 13px;
      background: transparent;
      border: 1px dashed var(--border-card);
      border-radius: var(--radius-card);
      color: var(--text-muted);
      font-family: var(--font-sans);
      font-size: 0.9rem;
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition), background var(--transition);
    }
    #btn-add-task:hover {
      color: var(--accent-hover);
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 40px 0 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ── MODAL ── */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: var(--z-modal);
      padding: 20px;
    }

    #modal {
      background: #1c1c26;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      animation: modal-in 200ms ease;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    }

    #modal p {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    #modal small {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: block;
      margin-bottom: 24px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn-primary {
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      padding: 10px 24px;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-ghost {
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 500;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-btn);
      padding: 10px 24px;
      cursor: pointer;
      transition: color var(--transition), border-color var(--transition);
    }
    .btn-ghost:hover { color: var(--text-primary); border-color: var(--border-hover); }

    /* ── UTILITY ── */
    .hidden { display: none !important; }

    /* ── ANIMATIONS ── */
    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 1px var(--accent), 0 0 10px var(--accent-glow); }
      50%       { box-shadow: 0 0 0 1px var(--accent), 0 0 24px var(--accent-glow), 0 0 40px rgba(99,102,241,0.15); }
    }

    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 6px var(--danger-glow); }
      50%       { text-shadow: 0 0 16px var(--danger-glow), 0 0 28px rgba(239,68,68,0.25); }
    }

    @keyframes modal-in {
      from { transform: scale(0.92) translateY(8px); opacity: 0; }
      to   { transform: scale(1) translateY(0);       opacity: 1; }
    }

    @keyframes task-add-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-5px); }
      60%       { transform: translateX(5px); }
    }

    @keyframes complete-flash {
      0%   { box-shadow: 0 0 0 1px rgba(34,197,94,0.12); }
      40%  { box-shadow: 0 0 0 3px rgba(34,197,94,0.5), 0 0 24px rgba(34,197,94,0.25); }
      100% { box-shadow: 0 0 0 1px rgba(34,197,94,0.12); }
    }

    .task-card.completing {
      animation: complete-flash 500ms ease forwards;
    }

    /* ── CHAT FAB ── */
    #chat-fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(99,102,241,0.45);
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      z-index: var(--z-chat);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    #chat-fab:hover {
      background: var(--accent-hover);
      transform: scale(1.08);
      box-shadow: 0 6px 28px rgba(99,102,241,0.55);
    }
    #chat-fab:active { transform: scale(0.96); }

    /* ── CHAT PANEL ── */
    #chat-panel {
      position: fixed;
      bottom: 88px;
      right: 24px;
      width: 360px;
      height: 520px;
      background: #17171f;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04);
      z-index: calc(var(--z-chat) - 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: chat-slide-in 220ms cubic-bezier(0.34,1.28,0.64,1);
    }
    #chat-panel.hidden { display: none !important; }

    @keyframes chat-slide-in {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── CHAT HEADER ── */
    #chat-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }

    #chat-header-icon {
      font-size: 1rem;
      line-height: 1;
    }

    #chat-header h3 {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .chat-icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--transition), background var(--transition);
      flex-shrink: 0;
    }
    .chat-icon-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.07); }

    /* ── CHAT MESSAGES ── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }

    .chat-msg {
      display: flex;
      flex-direction: column;
      max-width: 88%;
    }
    .chat-msg.user    { align-self: flex-end;  align-items: flex-end; }
    .chat-msg.bot     { align-self: flex-start; align-items: flex-start; }
    .chat-msg.error   { align-self: flex-start; align-items: flex-start; }

    .chat-bubble {
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 0.84rem;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .chat-msg.user .chat-bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .chat-msg.bot .chat-bubble {
      background: rgba(255,255,255,0.07);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }
    .chat-msg.error .chat-bubble {
      background: var(--danger-soft);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.2);
      border-bottom-left-radius: 4px;
    }

    /* ── LOADING DOTS ── */
    .chat-loading-bubble {
      background: rgba(255,255,255,0.07);
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .chat-loading-bubble span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: loading-dot 1.1s ease-in-out infinite;
    }
    .chat-loading-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .chat-loading-bubble span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes loading-dot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.35; }
      40%            { transform: scale(1);   opacity: 1; }
    }

    /* ── CHAT EMPTY STATE ── */
    .chat-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-muted);
      text-align: center;
      padding: 20px;
      font-size: 0.82rem;
      line-height: 1.6;
    }
    .chat-empty-icon { font-size: 2rem; margin-bottom: 4px; }

    /* ── CHAT INPUT AREA ── */
    #chat-input-area {
      padding: 10px 12px;
      border-top: 1px solid rgba(255,255,255,0.07);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 0.84rem;
      padding: 8px 12px;
      outline: none;
      resize: none;
      min-height: 36px;
      max-height: 96px;
      line-height: 1.45;
      transition: border-color var(--transition);
      overflow-y: auto;
    }
    #chat-input:focus { border-color: rgba(99,102,241,0.45); }
    #chat-input::placeholder { color: var(--text-muted); }

    #chat-send {
      background: var(--accent);
      border: none;
      border-radius: 9px;
      color: #fff;
      width: 34px;
      height: 34px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background var(--transition), opacity var(--transition);
    }
    #chat-send:hover:not(:disabled) { background: var(--accent-hover); }
    #chat-send:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── API KEY SETUP VIEW ── */
    #chat-setup {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      gap: 14px;
      text-align: center;
    }

    .chat-setup-icon { font-size: 2rem; }

    #chat-setup h4 {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    #chat-setup p {
      font-size: 0.82rem;
      color: var(--text-secondary);
      line-height: 1.55;
      max-width: 260px;
    }

    #chat-setup-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 9px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      padding: 10px 12px;
      outline: none;
      transition: border-color var(--transition);
      letter-spacing: 0.02em;
    }
    #chat-setup-input:focus { border-color: rgba(99,102,241,0.5); }
    #chat-setup-input::placeholder { color: var(--text-muted); font-family: var(--font-sans); letter-spacing: 0; }

    #chat-setup-save {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition);
    }
    #chat-setup-save:hover { background: var(--accent-hover); }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .task-card { grid-template-columns: 24px 1fr auto 30px; gap: 6px; padding: 12px 8px; }
      .timer-display { font-size: 1.15rem; }
      .timer-edit-input { font-size: 1.15rem; width: 100px; }
      #header h1 { font-size: 1.1rem; }
      #chat-panel { right: 12px; left: 12px; width: auto; bottom: 82px; height: 58vh; min-height: 360px; }
      #chat-fab { bottom: 18px; right: 18px; }
    }
  </style>
</head>
<body>
<div id="app">
  <header id="header">
    <h1>Daily Tasks</h1>
    <button id="btn-reset-day" class="hidden">Resetar dia</button>
  </header>

  <nav id="day-tabs"></nav>

  <main>
    <ul id="task-list"></ul>
    <button id="btn-add-task">+ Adicionar tarefa</button>
  </main>
</div>

<!-- Modal de reset diário -->
<div id="modal-overlay" class="hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div id="modal">
    <p id="modal-title">Novo dia!</p>
    <small>Deseja resetar o progresso das tarefas de hoje?</small>
    <div class="modal-actions">
      <button id="btn-modal-reset" class="btn-primary">Resetar</button>
      <button id="btn-modal-no" class="btn-ghost">Não</button>
    </div>
  </div>
</div>

<!-- Chat FAB -->
<button id="chat-fab" title="Assistente IA">✦</button>

<!-- Chat Panel -->
<div id="chat-panel" class="hidden" role="complementary" aria-label="Assistente IA">
  <div id="chat-header">
    <span id="chat-header-icon">✦</span>
    <h3>Assistente IA</h3>
    <button class="chat-icon-btn" id="chat-btn-settings" title="Configurar chave de API">⚙</button>
    <button class="chat-icon-btn" id="chat-btn-clear" title="Limpar conversa">↺</button>
    <button class="chat-icon-btn" id="chat-btn-close" title="Fechar">✕</button>
  </div>

  <!-- API key setup view -->
  <div id="chat-setup" class="hidden">
    <div class="chat-setup-icon">🔑</div>
    <h4>Configurar API Key</h4>
    <p>Cole aqui sua chave da API do Gemini. Ela será salva apenas no seu navegador.</p>
    <input id="chat-setup-input" type="password" placeholder="Cole sua chave aqui..." autocomplete="off" spellcheck="false" />
    <button id="chat-setup-save">Salvar e começar</button>
  </div>

  <!-- Messages area -->
  <div id="chat-messages"></div>

  <!-- Input area -->
  <div id="chat-input-area">
    <textarea id="chat-input" placeholder='Ex: "adiciona leitura de 30min na terça"' rows="1"></textarea>
    <button id="chat-send" title="Enviar">↑</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── CONSTANTES ── */
  const DAYS = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  const DAY_LABELS = { sunday:'Dom', monday:'Seg', tuesday:'Ter', wednesday:'Qua', thursday:'Qui', friday:'Sex', saturday:'Sáb' };
  const LS_SCHEDULE = 'taskmanager_schedule';
  const LS_PROGRESS = 'taskmanager_progress';
  const LS_TIMER    = 'taskmanager_timer';
  const LS_RESET_PROMPTED = 'taskmanager_reset_prompted';
  const LS_NO_RESET = 'taskmanager_no_reset_chosen';
  const LS_VERSION  = 'taskmanager_version';
  const LS_GEMINI_KEY = 'taskmanager_gemini_key';
  const SCHEDULE_VERSION = 3;

  /* ── ESTADO ── */
  const AppState = {
    schedule: {},
    progress: {},
    timerMeta: { taskId: null, startedAt: null, remainingAtStart: null },
    activeTaskId: null,
    activeInterval: null,
    currentDay: null,
    deleteConfirm: {},
    editingTimer: false,
  };

  /* ── PERSISTÊNCIA ── */
  function loadState() {
    try {
      const sched = localStorage.getItem(LS_SCHEDULE);
      AppState.schedule = sched ? JSON.parse(sched) : {};
    } catch { AppState.schedule = {}; }

    DAYS.forEach(d => { if (!AppState.schedule[d]) AppState.schedule[d] = []; });

    try {
      const prog = localStorage.getItem(LS_PROGRESS);
      AppState.progress = prog ? JSON.parse(prog) : { date: null, data: {}, completed: {} };
    } catch { AppState.progress = { date: null, data: {}, completed: {} }; }

    if (!AppState.progress.data) AppState.progress.data = {};
    if (!AppState.progress.completed) AppState.progress.completed = {};

    try {
      const tm = localStorage.getItem(LS_TIMER);
      AppState.timerMeta = tm ? JSON.parse(tm) : { taskId: null, startedAt: null, remainingAtStart: null };
    } catch { AppState.timerMeta = { taskId: null, startedAt: null, remainingAtStart: null }; }
  }

  function saveSchedule() { localStorage.setItem(LS_SCHEDULE, JSON.stringify(AppState.schedule)); }
  function saveProgress() { localStorage.setItem(LS_PROGRESS, JSON.stringify(AppState.progress)); }

  function saveTimerState() {
    if (AppState.timerMeta.taskId) {
      localStorage.setItem(LS_TIMER, JSON.stringify(AppState.timerMeta));
    } else {
      localStorage.removeItem(LS_TIMER);
    }
  }

  /* ── DATA / HORA ── */
  function getTodaySP() {
    return new Date().toLocaleDateString('sv-SE', { timeZone: 'America/Sao_Paulo' });
  }

  function getTodayDayKey() {
    const d = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
    return DAYS[d.getDay()];
  }

  /* ── UTILITÁRIOS DE TEMPO ── */
  function parseTimeInput(str) {
    if (!str || !str.trim()) return null;
    str = str.trim().toLowerCase();
    if (/^\d+:\d{2}(:\d{2})?$/.test(str)) {
      const parts = str.split(':').map(Number);
      if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
      if (parts.length === 2) return parts[0]*3600 + parts[1]*60;
    }
    const match = str.match(/^(?:(\d+)h)?(?:(\d+)m)?(?:(\d+)s)?$/);
    if (match && (match[1] || match[2] || match[3])) {
      const total = parseInt(match[1]||0)*3600 + parseInt(match[2]||0)*60 + parseInt(match[3]||0);
      return total > 0 ? total : null;
    }
    if (/^\d+$/.test(str)) {
      const mins = parseInt(str);
      return mins > 0 ? mins * 60 : null;
    }
    return null;
  }

  function formatTime(seconds) {
    const neg = seconds < 0;
    const abs = Math.abs(seconds);
    const h = Math.floor(abs / 3600);
    const m = Math.floor((abs % 3600) / 60);
    const s = abs % 60;
    return (neg ? '−' : '') + h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  }

  function formatAlloc(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    if (h && m) return h + 'h' + m + 'm';
    if (h) return h + 'h';
    return m + 'm';
  }

  /* ── UUID ── */
  function genId() {
    if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  /* ── PROGRESSO ── */
  function getRemainingSeconds(taskId) {
    const p = AppState.progress.data[taskId];
    if (p !== undefined) return p;
    for (const day of DAYS) {
      const t = (AppState.schedule[day] || []).find(t => t.id === taskId);
      if (t) return t.allocatedSeconds;
    }
    return 0;
  }

  function setRemainingSeconds(taskId, secs) {
    AppState.progress.data[taskId] = secs;
    saveProgress();
  }

  function initProgressForDay(dayKey) {
    const today = getTodaySP();
    (AppState.schedule[dayKey] || []).forEach(task => {
      if (AppState.progress.data[task.id] === undefined) {
        AppState.progress.data[task.id] = task.allocatedSeconds;
      }
    });
    AppState.progress.date = today;
    saveProgress();
  }

  /* ── CONCLUSÃO ── */
  function isCompleted(taskId) {
    return !!(AppState.progress.completed && AppState.progress.completed[taskId]);
  }

  function completeTask(dayKey, taskId) {
    if (AppState.activeTaskId === taskId) pauseTimer();
    setRemainingSeconds(taskId, 0);
    AppState.progress.completed[taskId] = true;
    saveProgress();
    const card = document.querySelector(`.task-card[data-id="${taskId}"]`);
    if (card) {
      card.classList.add('completing');
      setTimeout(() => renderApp(), 480);
    } else {
      renderApp();
    }
  }

  function reopenTask(dayKey, taskId) {
    let allocatedSeconds = 0;
    for (const day of DAYS) {
      const t = (AppState.schedule[day] || []).find(t => t.id === taskId);
      if (t) { allocatedSeconds = t.allocatedSeconds; break; }
    }
    setRemainingSeconds(taskId, allocatedSeconds);
    delete AppState.progress.completed[taskId];
    saveProgress();
    renderApp();
  }

  /* ── TAREFAS PADRÃO ── */
  const DEFAULT_TASKS = [
    { name: 'Casa',             allocatedSeconds: 3600  },
    { name: 'Trabalho',         allocatedSeconds: 10800 },
    { name: 'Newsletter',       allocatedSeconds: 1200  },
    { name: 'Itamaraty',        allocatedSeconds: 1800  },
    { name: 'Judi',             allocatedSeconds: 1200  },
    { name: 'Estudos',          allocatedSeconds: 3600  },
    { name: 'Vídeos dev',       allocatedSeconds: 1800  },
    { name: 'Vagas linkedin',   allocatedSeconds: 1200  },
    { name: 'Duolingo + chess', allocatedSeconds: 1200  },
    { name: 'Daily tasks',      allocatedSeconds: 600   },
    { name: 'Blog',             allocatedSeconds: 1200  },
  ];

  function seedDefaultTasks() {
    const storedVersion = parseInt(localStorage.getItem(LS_VERSION) || '0');
    if (storedVersion >= SCHEDULE_VERSION) return;
    [LS_SCHEDULE, LS_PROGRESS, LS_TIMER, LS_RESET_PROMPTED, LS_NO_RESET].forEach(k => localStorage.removeItem(k));
    AppState.schedule = {};
    AppState.progress = { date: null, data: {}, completed: {} };
    AppState.timerMeta = { taskId: null, startedAt: null, remainingAtStart: null };
    DAYS.forEach(d => {
      AppState.schedule[d] = DEFAULT_TASKS.map(t => ({ id: genId(), name: t.name, allocatedSeconds: t.allocatedSeconds }));
    });
    saveSchedule();
    localStorage.setItem(LS_VERSION, String(SCHEDULE_VERSION));
  }

  /* ── RESET DIÁRIO ── */
  function checkDailyReset() {
    const today = getTodaySP();
    const savedDate = AppState.progress.date;
    const prompted = localStorage.getItem(LS_RESET_PROMPTED);
    const noReset = localStorage.getItem(LS_NO_RESET);

    if (!savedDate || savedDate === today) {
      initProgressForDay(AppState.currentDay);
      if (noReset === today) showResetDayButtonUI(false);
      return;
    }
    if (prompted === today) {
      initProgressForDay(AppState.currentDay);
      if (noReset === today) showResetDayButtonUI(false);
      return;
    }
    localStorage.setItem(LS_RESET_PROMPTED, today);
    showResetModal();
  }

  function performReset() {
    const today = getTodaySP();
    AppState.progress = { date: today, data: {}, completed: {} };
    DAYS.forEach(day => {
      (AppState.schedule[day] || []).forEach(task => {
        AppState.progress.data[task.id] = task.allocatedSeconds;
      });
    });
    saveProgress();
  }

  /* ── MODAL ── */
  function showResetModal() {
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.remove('hidden');
    const btnReset = document.getElementById('btn-modal-reset');
    const btnNo    = document.getElementById('btn-modal-no');
    btnReset.focus();
    overlay.addEventListener('keydown', trapFocus);
    btnReset.onclick = () => { performReset(); hideModal(); renderApp(); };
    btnNo.onclick = () => {
      const today = getTodaySP();
      localStorage.setItem(LS_NO_RESET, today);
      initProgressForDay(AppState.currentDay);
      hideModal();
      showResetDayButtonUI(false);
    };
  }

  function hideModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
    document.getElementById('modal-overlay').removeEventListener('keydown', trapFocus);
  }

  function trapFocus(e) {
    if (e.key !== 'Tab') return;
    const focusable = document.querySelectorAll('#modal button');
    const first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
    else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
  }

  /* ── BOTÃO RESETAR DIA ── */
  let resetBtnTimeout = null;
  function showResetDayButtonUI() {
    const btn = document.getElementById('btn-reset-day');
    btn.classList.remove('hidden');
    btn.onclick = () => {
      if (btn.classList.contains('confirming')) {
        clearTimeout(resetBtnTimeout);
        performReset();
        btn.textContent = 'Resetar dia';
        btn.classList.remove('confirming');
        btn.classList.add('hidden');
        localStorage.removeItem(LS_NO_RESET);
        renderApp();
      } else {
        btn.textContent = 'Tem certeza?';
        btn.classList.add('confirming');
        resetBtnTimeout = setTimeout(() => {
          btn.textContent = 'Resetar dia';
          btn.classList.remove('confirming');
        }, 4000);
      }
    };
  }

  /* ── CRUD TAREFAS ── */
  function addTask(dayKey) {
    const task = { id: genId(), name: 'Nova tarefa', allocatedSeconds: 3600 };
    AppState.schedule[dayKey].push(task);
    AppState.progress.data[task.id] = task.allocatedSeconds;
    saveSchedule();
    saveProgress();
    renderApp();
    setTimeout(() => {
      const card = document.querySelector(`.task-card[data-id="${task.id}"]`);
      if (card) startEditName(dayKey, task.id, card);
    }, 50);
  }

  function deleteTask(dayKey, taskId) {
    if (AppState.deleteConfirm[taskId]) {
      clearTimeout(AppState.deleteConfirm[taskId]);
      delete AppState.deleteConfirm[taskId];
      if (AppState.activeTaskId === taskId) pauseTimer();
      const card = document.querySelector(`.task-card[data-id="${taskId}"]`);
      if (card) {
        card.style.transition = 'opacity 150ms ease, transform 150ms ease, max-height 200ms ease, margin 200ms ease, padding 200ms ease';
        card.style.opacity = '0';
        card.style.transform = 'translateX(8px)';
        card.style.maxHeight = card.offsetHeight + 'px';
        requestAnimationFrame(() => { card.style.maxHeight='0'; card.style.padding='0'; card.style.margin='0'; });
        setTimeout(() => {
          AppState.schedule[dayKey] = AppState.schedule[dayKey].filter(t => t.id !== taskId);
          delete AppState.progress.data[taskId];
          delete AppState.progress.completed[taskId];
          saveSchedule(); saveProgress(); renderApp();
        }, 210);
      } else {
        AppState.schedule[dayKey] = AppState.schedule[dayKey].filter(t => t.id !== taskId);
        delete AppState.progress.data[taskId];
        delete AppState.progress.completed[taskId];
        saveSchedule(); saveProgress(); renderApp();
      }
    } else {
      const btn = document.querySelector(`.task-card[data-id="${taskId}"] .btn-delete`);
      if (btn) { btn.textContent = '✕?'; btn.classList.add('confirming'); }
      AppState.deleteConfirm[taskId] = setTimeout(() => {
        delete AppState.deleteConfirm[taskId];
        const b = document.querySelector(`.task-card[data-id="${taskId}"] .btn-delete`);
        if (b) { b.textContent = '✕'; b.classList.remove('confirming'); }
      }, 3000);
    }
  }

  function updateTaskName(dayKey, taskId, name) {
    const task = AppState.schedule[dayKey].find(t => t.id === taskId);
    if (task) { task.name = name; saveSchedule(); }
  }

  function updateTaskAlloc(dayKey, taskId, secs) {
    const task = AppState.schedule[dayKey].find(t => t.id === taskId);
    if (!task) return;
    task.allocatedSeconds = secs;
    const rem = getRemainingSeconds(taskId);
    if (rem > secs) setRemainingSeconds(taskId, secs);
    saveSchedule(); saveProgress();
  }

  /* ── TIMER ── */
  function calcRemaining() {
    const { startedAt, remainingAtStart } = AppState.timerMeta;
    if (!startedAt) return null;
    return remainingAtStart - Math.floor((Date.now() - startedAt) / 1000);
  }

  function startTimer(taskId) {
    if (AppState.activeTaskId && AppState.activeTaskId !== taskId) pauseTimer();
    if (AppState.activeTaskId === taskId) return;
    const rem = getRemainingSeconds(taskId);
    AppState.timerMeta = { taskId, startedAt: Date.now(), remainingAtStart: rem };
    saveTimerState();
    AppState.activeTaskId = taskId;
    AppState.activeInterval = setInterval(tickTimer, 1000);
    const card = document.querySelector(`.task-card[data-id="${taskId}"]`);
    if (card) {
      card.classList.add('running');
      const btn = card.querySelector('.btn-start-pause');
      if (btn) btn.textContent = '⏸ Pausar';
      updateNegativeClass(card, rem);
    }
  }

  function pauseTimer() {
    if (!AppState.activeTaskId) return;
    clearInterval(AppState.activeInterval);
    AppState.activeInterval = null;
    const newRem = calcRemaining();
    if (newRem !== null) setRemainingSeconds(AppState.activeTaskId, newRem);
    const taskId = AppState.activeTaskId;
    AppState.activeTaskId = null;
    AppState.timerMeta = { taskId: null, startedAt: null, remainingAtStart: null };
    saveTimerState();
    const card = document.querySelector(`.task-card[data-id="${taskId}"]`);
    if (card) {
      card.classList.remove('running');
      const btn = card.querySelector('.btn-start-pause');
      if (btn) btn.textContent = '▶ Iniciar';
      if (newRem !== null) updateNegativeClass(card, newRem);
    }
  }

  function tickTimer() {
    const newRem = calcRemaining();
    if (newRem === null || !AppState.activeTaskId) return;
    AppState.progress.data[AppState.activeTaskId] = newRem;
    saveProgress();
    if (!AppState.editingTimer) {
      const card = document.querySelector(`.task-card[data-id="${AppState.activeTaskId}"]`);
      if (card) {
        const display = card.querySelector('.timer-display');
        if (display && display.tagName !== 'INPUT') display.textContent = formatTime(newRem);
        updateNegativeClass(card, newRem);
      }
    }
  }

  function restoreTimerIfActive() {
    const { taskId, startedAt } = AppState.timerMeta;
    if (!taskId || !startedAt) return;
    const taskExists = DAYS.some(d => (AppState.schedule[d] || []).some(t => t.id === taskId));
    if (!taskExists) {
      AppState.timerMeta = { taskId: null, startedAt: null, remainingAtStart: null };
      saveTimerState(); return;
    }
    const newRem = calcRemaining();
    if (newRem !== null) { AppState.progress.data[taskId] = newRem; saveProgress(); }
    AppState.activeTaskId = taskId;
    AppState.activeInterval = setInterval(tickTimer, 1000);
    const card = document.querySelector(`.task-card[data-id="${taskId}"]`);
    if (card) {
      card.classList.add('running');
      const btn = card.querySelector('.btn-start-pause');
      if (btn) btn.textContent = '⏸ Pausar';
      if (newRem !== null) updateNegativeClass(card, newRem);
    }
  }

  function updateNegativeClass(card, secs) {
    if (secs < 0) card.classList.add('negative');
    else card.classList.remove('negative');
  }

  /* ── EDIÇÃO INLINE ── */
  function startEditName(dayKey, taskId, card) {
    const span = card.querySelector('.task-name');
    if (!span || span.tagName === 'INPUT') return;
    const task = AppState.schedule[dayKey].find(t => t.id === taskId);
    if (!task) return;
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'edit-input task-name-input';
    input.value = task.name;
    span.replaceWith(input);
    input.focus(); input.select();
    const commit = () => {
      const val = input.value.trim();
      if (val) updateTaskName(dayKey, taskId, val);
      input.replaceWith(makeNameSpan(dayKey, taskId, val || task.name, card));
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.removeEventListener('blur', commit); input.replaceWith(makeNameSpan(dayKey, taskId, task.name, card)); }
    });
  }

  function makeNameSpan(dayKey, taskId, name, card) {
    const span = document.createElement('span');
    span.className = 'task-name';
    span.textContent = name;
    span.title = 'Clique para editar o nome';
    span.addEventListener('click', () => startEditName(dayKey, taskId, card));
    return span;
  }

  function startEditTimer(taskId, card) {
    const display = card.querySelector('.timer-display');
    if (!display || display.tagName === 'INPUT') return;
    AppState.editingTimer = true;
    const rem = getRemainingSeconds(taskId);
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'edit-input timer-edit-input';
    input.value = formatTime(rem).replace('−', '-');
    display.replaceWith(input);
    input.focus(); input.select();
    const commit = () => {
      AppState.editingTimer = false;
      const raw = input.value.trim().replace(/^-/, '');
      const neg = input.value.trim().startsWith('-');
      const secs = parseTimeInput(raw);
      let newRem;
      if (secs !== null) {
        newRem = neg ? -secs : secs;
        setRemainingSeconds(taskId, newRem);
        if (AppState.activeTaskId === taskId) {
          AppState.timerMeta = { taskId, startedAt: Date.now(), remainingAtStart: newRem };
          saveTimerState();
        }
      } else { newRem = rem; }
      input.replaceWith(makeTimerDisplay(taskId, card));
      updateNegativeClass(card, newRem);
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { AppState.editingTimer = false; input.replaceWith(makeTimerDisplay(taskId, card)); }
    });
  }

  function makeTimerDisplay(taskId, card, readonly) {
    const span = document.createElement('span');
    span.className = 'timer-display' + (readonly ? ' readonly' : '');
    span.textContent = formatTime(getRemainingSeconds(taskId));
    if (!readonly) {
      span.title = 'Clique para editar o tempo restante';
      span.addEventListener('click', () => startEditTimer(taskId, card));
    }
    return span;
  }

  /* ── DRAG AND DROP ── */
  let dragSrcId = null, dragSrcDay = null;

  function bindDragEvents(li, dayKey, taskId) {
    const handle = li.querySelector('.drag-handle');
    handle.addEventListener('mousedown', () => { li.draggable = true; });
    handle.addEventListener('mouseup', () => { li.draggable = false; });
    li.addEventListener('dragstart', e => {
      dragSrcId = taskId; dragSrcDay = dayKey;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', taskId);
      li.classList.add('dragging');
    });
    li.addEventListener('dragend', () => {
      li.draggable = false; li.classList.remove('dragging');
      document.querySelectorAll('.task-card').forEach(c => c.classList.remove('drag-over'));
    });
    li.addEventListener('dragover', e => {
      e.preventDefault(); e.dataTransfer.dropEffect = 'move';
      if (dragSrcId !== taskId) li.classList.add('drag-over');
    });
    li.addEventListener('dragleave', () => { li.classList.remove('drag-over'); });
    li.addEventListener('drop', e => {
      e.preventDefault(); li.classList.remove('drag-over');
      if (dragSrcId === taskId || dragSrcDay !== dayKey) return;
      const tasks = AppState.schedule[dayKey];
      const fromIdx = tasks.findIndex(t => t.id === dragSrcId);
      const toIdx   = tasks.findIndex(t => t.id === taskId);
      if (fromIdx === -1 || toIdx === -1) return;
      const rect = li.getBoundingClientRect();
      const insertBefore = e.clientY < (rect.top + rect.height / 2);
      const [moved] = tasks.splice(fromIdx, 1);
      const newToIdx = tasks.findIndex(t => t.id === taskId);
      tasks.splice(insertBefore ? newToIdx : newToIdx + 1, 0, moved);
      saveSchedule(); renderApp();
    });
  }

  /* ── RENDER ── */
  function renderTaskCard(task, dayKey) {
    const li = document.createElement('li');
    li.className = 'task-card';
    li.dataset.id = task.id;
    const rem = getRemainingSeconds(task.id);
    const isActive = AppState.activeTaskId === task.id;
    const done = isCompleted(task.id);
    if (isActive) li.classList.add('running');
    if (!done && rem < 0) li.classList.add('negative');
    if (done) li.classList.add('completed');

    const handle = document.createElement('span');
    handle.className = 'drag-handle';
    handle.innerHTML = '⠿';
    if (!done) handle.title = 'Arrastar para reordenar';

    const body = document.createElement('div');
    body.className = 'task-body';
    body.appendChild(makeNameSpan(dayKey, task.id, task.name, li));

    const timerSection = document.createElement('div');
    timerSection.className = 'task-timer-section';
    timerSection.appendChild(makeTimerDisplay(task.id, li, done));

    const buttonsRow = document.createElement('div');
    buttonsRow.className = 'task-timer-buttons';

    if (done) {
      const btnReopen = document.createElement('button');
      btnReopen.className = 'btn-start-pause reopen';
      btnReopen.textContent = '↺ Reabrir';
      btnReopen.addEventListener('click', () => reopenTask(dayKey, task.id));
      buttonsRow.appendChild(btnReopen);
    } else {
      const btnComplete = document.createElement('button');
      btnComplete.className = 'btn-complete';
      btnComplete.textContent = '✓';
      btnComplete.title = 'Marcar como concluída';
      btnComplete.addEventListener('click', () => completeTask(dayKey, task.id));

      const btnStartPause = document.createElement('button');
      btnStartPause.className = 'btn-start-pause';
      btnStartPause.textContent = isActive ? '⏸ Pausar' : '▶ Iniciar';
      btnStartPause.addEventListener('click', () => {
        if (AppState.activeTaskId === task.id) pauseTimer(); else startTimer(task.id);
      });
      buttonsRow.appendChild(btnComplete);
      buttonsRow.appendChild(btnStartPause);
    }
    timerSection.appendChild(buttonsRow);

    const btnDelete = document.createElement('button');
    btnDelete.className = 'btn-delete';
    btnDelete.textContent = '✕';
    btnDelete.title = 'Excluir tarefa';
    if (AppState.deleteConfirm[task.id]) { btnDelete.textContent = '✕?'; btnDelete.classList.add('confirming'); }
    btnDelete.addEventListener('click', () => deleteTask(dayKey, task.id));

    li.appendChild(handle);
    li.appendChild(body);
    li.appendChild(timerSection);
    li.appendChild(btnDelete);
    if (!done) bindDragEvents(li, dayKey, task.id);
    return li;
  }

  function renderDayTabs() {
    const nav = document.getElementById('day-tabs');
    nav.innerHTML = '';
    const todayKey = getTodayDayKey();
    DAYS.forEach(day => {
      const btn = document.createElement('button');
      btn.className = 'day-tab';
      btn.textContent = DAY_LABELS[day];
      btn.dataset.day = day;
      if (day === AppState.currentDay) btn.classList.add('active');
      if (day === todayKey) btn.classList.add('today');
      btn.addEventListener('click', () => switchDay(day));
      nav.appendChild(btn);
    });
  }

  function switchDay(dayKey) {
    if (AppState.activeTaskId) pauseTimer();
    AppState.currentDay = dayKey;
    initProgressForDay(dayKey);
    renderApp();
  }

  function renderApp() {
    renderDayTabs();
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    const allTasks = AppState.schedule[AppState.currentDay] || [];
    if (allTasks.length === 0) {
      const empty = document.createElement('li');
      empty.className = 'empty-state';
      empty.textContent = 'Nenhuma tarefa para este dia.';
      list.appendChild(empty);
    } else {
      const sorted = [...allTasks].sort((a, b) => (isCompleted(a.id)?1:0) - (isCompleted(b.id)?1:0));
      sorted.forEach(task => list.appendChild(renderTaskCard(task, AppState.currentDay)));
    }
  }

  /* ════════════════════════════════════════
     CHAT / GEMINI
  ════════════════════════════════════════ */

  const ChatState = {
    open: false,
    showingSetup: false,
    messages: [],       // {role:'user'|'bot'|'error', text:string}
    geminiHistory: [],  // Gemini API conversation array
    loading: false,
  };

  const LS_GEMINI_KEY_ACTUAL = LS_GEMINI_KEY;

  function getApiKey() { return localStorage.getItem(LS_GEMINI_KEY_ACTUAL) || ''; }
  function setApiKey(k) { localStorage.setItem(LS_GEMINI_KEY_ACTUAL, k.trim()); }

  /* Day mapping: handles Portuguese / abbreviated inputs from the AI */
  const DAY_NORMALIZE = {
    all:'all', todos:'all',
    sunday:'sunday',    dom:'sunday',    domingo:'sunday',
    monday:'monday',    seg:'monday',    segunda:'monday',    'segunda-feira':'monday',
    tuesday:'tuesday',  ter:'tuesday',   terca:'tuesday',     'terça':'tuesday',   'terça-feira':'tuesday',
    wednesday:'wednesday', qua:'wednesday', quarta:'wednesday',  'quarta-feira':'wednesday',
    thursday:'thursday',qui:'thursday',  quinta:'thursday',   'quinta-feira':'thursday',
    friday:'friday',    sex:'friday',    sexta:'friday',      'sexta-feira':'friday',
    saturday:'saturday',sab:'saturday',  sábado:'saturday',   sabado:'saturday',   'sáb':'saturday',
  };

  function expandDays(days) {
    const normalized = days.map(d => DAY_NORMALIZE[d.toLowerCase()] || d.toLowerCase());
    if (normalized.includes('all')) return [...DAYS];
    return normalized.filter(d => DAYS.includes(d));
  }

  function buildScheduleContext() {
    const lines = ['Estado atual do schedule (tarefas por dia):'];
    DAYS.forEach(day => {
      const tasks = AppState.schedule[day] || [];
      const label = DAY_LABELS[day] + ' (' + day + ')';
      if (tasks.length > 0) {
        lines.push('  ' + label + ': ' + tasks.map(t => '"' + t.name + '" (' + Math.round(t.allocatedSeconds/60) + 'min)').join(', '));
      } else {
        lines.push('  ' + label + ': (sem tarefas)');
      }
    });
    return lines.join('\n');
  }

  const GEMINI_TOOLS = [{
    functionDeclarations: [
      {
        name: 'add_task',
        description: 'Adiciona uma nova tarefa em um ou mais dias da semana.',
        parameters: {
          type: 'OBJECT',
          properties: {
            name:             { type: 'STRING', description: 'Nome da tarefa' },
            days:             { type: 'ARRAY',  items: { type: 'STRING' }, description: 'Dias da semana em inglês (monday, tuesday, etc.) ou ["all"] para todos.' },
            allocatedMinutes: { type: 'NUMBER', description: 'Tempo alocado em minutos' },
          },
          required: ['name', 'days', 'allocatedMinutes'],
        },
      },
      {
        name: 'remove_task',
        description: 'Remove uma tarefa de um ou mais dias da semana.',
        parameters: {
          type: 'OBJECT',
          properties: {
            taskName: { type: 'STRING', description: 'Nome (ou parte do nome) da tarefa a remover' },
            days:     { type: 'ARRAY',  items: { type: 'STRING' }, description: 'Dias onde remover, ou ["all"] para todos.' },
          },
          required: ['taskName', 'days'],
        },
      },
      {
        name: 'update_task',
        description: 'Renomeia ou altera o tempo alocado de uma tarefa existente.',
        parameters: {
          type: 'OBJECT',
          properties: {
            taskName:            { type: 'STRING', description: 'Nome atual (ou parte) da tarefa' },
            days:                { type: 'ARRAY',  items: { type: 'STRING' }, description: 'Dias onde a tarefa existe, ou ["all"].' },
            newName:             { type: 'STRING', description: 'Novo nome (opcional)' },
            newAllocatedMinutes: { type: 'NUMBER', description: 'Novo tempo em minutos (opcional)' },
          },
          required: ['taskName', 'days'],
        },
      },
    ],
  }];

  function executeAction(fnName, args) {
    if (fnName === 'add_task') {
      const { name, days, allocatedMinutes } = args;
      const targetDays = expandDays(days);
      if (!targetDays.length) return { success: false, message: 'Nenhum dia válido fornecido.' };
      const allocSecs = Math.round(Number(allocatedMinutes) * 60);
      targetDays.forEach(day => {
        const task = { id: genId(), name, allocatedSeconds: allocSecs };
        AppState.schedule[day].push(task);
        AppState.progress.data[task.id] = allocSecs;
      });
      saveSchedule(); saveProgress(); renderApp();
      return { success: true, addedToDays: targetDays };
    }

    if (fnName === 'remove_task') {
      const { taskName, days } = args;
      const targetDays = expandDays(days);
      if (!targetDays.length) return { success: false, message: 'Nenhum dia válido.' };
      let removed = 0;
      targetDays.forEach(day => {
        const tasks = AppState.schedule[day] || [];
        const idx = tasks.findIndex(t => t.name.toLowerCase().includes(taskName.toLowerCase()));
        if (idx !== -1) {
          const [task] = tasks.splice(idx, 1);
          delete AppState.progress.data[task.id];
          delete AppState.progress.completed[task.id];
          removed++;
        }
      });
      saveSchedule(); saveProgress(); renderApp();
      return { success: true, removedCount: removed };
    }

    if (fnName === 'update_task') {
      const { taskName, days, newName, newAllocatedMinutes } = args;
      const targetDays = expandDays(days);
      if (!targetDays.length) return { success: false, message: 'Nenhum dia válido.' };
      let updated = 0;
      targetDays.forEach(day => {
        const task = (AppState.schedule[day] || []).find(t => t.name.toLowerCase().includes(taskName.toLowerCase()));
        if (task) {
          if (newName) task.name = newName;
          if (newAllocatedMinutes) {
            task.allocatedSeconds = Math.round(Number(newAllocatedMinutes) * 60);
            if (AppState.progress.data[task.id] === undefined || AppState.progress.data[task.id] > task.allocatedSeconds) {
              AppState.progress.data[task.id] = task.allocatedSeconds;
            }
          }
          updated++;
        }
      });
      saveSchedule(); saveProgress(); renderApp();
      return { success: true, updatedCount: updated };
    }

    return { success: false, message: 'Função desconhecida: ' + fnName };
  }

  function buildSystemInstruction() {
    return [
      'Você é um assistente para gerenciar tarefas diárias.',
      'Use as funções disponíveis para adicionar, remover ou editar tarefas.',
      'Ao usar funções, passe sempre os dias em inglês (monday, tuesday, wednesday, thursday, friday, saturday, sunday) ou "all" para todos os dias.',
      'Responda sempre em português, de forma breve. Confirme o que foi feito sem repetir detalhes óbvios.',
      'Não peça confirmação — execute diretamente.',
      '',
      buildScheduleContext(),
    ].join('\n');
  }

  async function callGemini(contents) {
    const key = getApiKey();
    const res = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + key,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: buildSystemInstruction() }] },
          contents,
          tools: GEMINI_TOOLS,
          generationConfig: { temperature: 0.2, maxOutputTokens: 512 },
        }),
      }
    );
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || 'Erro ' + res.status + ' na API do Gemini.');
    }
    return res.json();
  }

  async function sendChatMessage(userText) {
    if (ChatState.loading) return;
    ChatState.loading = true;
    setChatSendDisabled(true);

    appendMessage('user', userText);
    const loadingEl = appendLoading();

    try {
      // First call: user message + history
      const userPart = { role: 'user', parts: [{ text: userText }] };
      const contents1 = [...ChatState.geminiHistory, userPart];
      const data1 = await callGemini(contents1);

      const candidate1 = data1.candidates?.[0];
      if (!candidate1) throw new Error('Resposta vazia da API.');

      const parts1 = candidate1.content?.parts || [];
      const functionCalls = parts1.filter(p => p.functionCall);

      // Update history with user message + model response
      ChatState.geminiHistory.push(userPart);
      ChatState.geminiHistory.push({ role: 'model', parts: parts1 });

      let finalText = '';

      if (functionCalls.length > 0) {
        // Execute all function calls
        const fnResponseParts = functionCalls.map(p => ({
          functionResponse: {
            name: p.functionCall.name,
            response: executeAction(p.functionCall.name, p.functionCall.args),
          },
        }));

        // Add function responses to history
        ChatState.geminiHistory.push({ role: 'user', parts: fnResponseParts });

        // Second call: get natural language confirmation
        const data2 = await callGemini(ChatState.geminiHistory);
        const parts2 = data2.candidates?.[0]?.content?.parts || [];
        finalText = parts2.map(p => p.text || '').join('').trim();
        ChatState.geminiHistory.push({ role: 'model', parts: parts2 });
      } else {
        // Pure text response (no action needed)
        finalText = parts1.map(p => p.text || '').join('').trim();
      }

      removeLoading(loadingEl);
      appendMessage('bot', finalText || 'Ok!');
    } catch (err) {
      removeLoading(loadingEl);
      appendMessage('error', err.message || 'Erro ao contactar a IA.');
    } finally {
      ChatState.loading = false;
      setChatSendDisabled(false);
    }
  }

  /* ── CHAT UI HELPERS ── */
  function appendMessage(role, text) {
    ChatState.messages.push({ role, text });
    const container = document.getElementById('chat-messages');

    // Remove empty state if present
    const emptyEl = container.querySelector('.chat-empty');
    if (emptyEl) emptyEl.remove();

    const msgEl = document.createElement('div');
    msgEl.className = 'chat-msg ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble';
    bubble.textContent = text;
    msgEl.appendChild(bubble);
    container.appendChild(msgEl);
    container.scrollTop = container.scrollHeight;
    return msgEl;
  }

  function appendLoading() {
    const container = document.getElementById('chat-messages');
    const wrap = document.createElement('div');
    wrap.className = 'chat-msg bot';
    const bubble = document.createElement('div');
    bubble.className = 'chat-loading-bubble';
    bubble.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(bubble);
    container.appendChild(wrap);
    container.scrollTop = container.scrollHeight;
    return wrap;
  }

  function removeLoading(el) { el?.remove(); }

  function setChatSendDisabled(disabled) {
    const btn = document.getElementById('chat-send');
    const inp = document.getElementById('chat-input');
    if (btn) btn.disabled = disabled;
    if (inp) inp.disabled = disabled;
  }

  function renderChatEmpty() {
    const container = document.getElementById('chat-messages');
    container.innerHTML = '';
    const el = document.createElement('div');
    el.className = 'chat-empty';
    el.innerHTML = '<div class="chat-empty-icon">✦</div>' +
      '<div>Olá! Descreva o que você quer fazer com suas tarefas.<br><br>' +
      '<em>Ex: "adiciona leitura de 30min na terça"<br>"remove duolingo de sábado"<br>"coloca reunião de 1h todos os dias"</em></div>';
    container.appendChild(el);
  }

  function showChatSetup() {
    ChatState.showingSetup = true;
    document.getElementById('chat-setup').classList.remove('hidden');
    document.getElementById('chat-messages').classList.add('hidden');
    document.getElementById('chat-input-area').classList.add('hidden');
    const inp = document.getElementById('chat-setup-input');
    inp.value = getApiKey();
    inp.focus();
  }

  function hideChatSetup() {
    ChatState.showingSetup = false;
    document.getElementById('chat-setup').classList.add('hidden');
    document.getElementById('chat-messages').classList.remove('hidden');
    document.getElementById('chat-input-area').classList.remove('hidden');
  }

  function openChat() {
    ChatState.open = true;
    const panel = document.getElementById('chat-panel');
    panel.classList.remove('hidden');
    // Re-trigger animation
    panel.style.animation = 'none';
    requestAnimationFrame(() => { panel.style.animation = ''; });

    if (!getApiKey()) {
      showChatSetup();
    } else {
      hideChatSetup();
      if (ChatState.messages.length === 0) renderChatEmpty();
    }
  }

  function closeChat() {
    ChatState.open = false;
    document.getElementById('chat-panel').classList.add('hidden');
  }

  function clearChat() {
    ChatState.messages = [];
    ChatState.geminiHistory = [];
    renderChatEmpty();
  }

  /* ── CHAT EVENT BINDINGS ── */
  function initChat() {
    document.getElementById('chat-fab').addEventListener('click', () => {
      ChatState.open ? closeChat() : openChat();
    });

    document.getElementById('chat-btn-close').addEventListener('click', closeChat);

    document.getElementById('chat-btn-settings').addEventListener('click', () => {
      ChatState.showingSetup ? hideChatSetup() : showChatSetup();
    });

    document.getElementById('chat-btn-clear').addEventListener('click', () => {
      if (ChatState.showingSetup) return;
      clearChat();
    });

    document.getElementById('chat-setup-save').addEventListener('click', () => {
      const key = document.getElementById('chat-setup-input').value.trim();
      if (!key) return;
      setApiKey(key);
      hideChatSetup();
      if (ChatState.messages.length === 0) renderChatEmpty();
      document.getElementById('chat-input').focus();
    });

    document.getElementById('chat-setup-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('chat-setup-save').click();
    });

    const chatInput = document.getElementById('chat-input');
    const chatSend  = document.getElementById('chat-send');

    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = Math.min(chatInput.scrollHeight, 96) + 'px';
    });

    chatInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        chatSend.click();
      }
    });

    chatSend.addEventListener('click', () => {
      const text = chatInput.value.trim();
      if (!text || ChatState.loading) return;
      if (!getApiKey()) { openChat(); showChatSetup(); return; }
      chatInput.value = '';
      chatInput.style.height = 'auto';
      sendChatMessage(text);
    });
  }

  /* ── INICIALIZAÇÃO ── */
  document.addEventListener('DOMContentLoaded', () => {
    loadState();
    seedDefaultTasks();
    AppState.currentDay = getTodayDayKey();
    checkDailyReset();
    renderApp();
    restoreTimerIfActive();
    initChat();

    document.getElementById('btn-add-task').addEventListener('click', () => {
      addTask(AppState.currentDay);
    });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && AppState.activeTaskId) tickTimer();
    });
  });

})();
</script>
